    <main>

        <form class="container-calculo">

            <h1>Cálculo de nota</h1>

            <div class="rubros-container">
                
                <div class="rubro-card">

                    <label>Rubro #1</label> 
                    <input type="number" class="input-nota" required placeholder="Nota" min="0" max="100">
                    <input type="number" class="input-porcentaje" required placeholder="%" min="1" max="100">
                </div>

                <div class="rubro-card">

                    <label>Rubro #2</label>
                    <input class="btn-eliminar" type="button" value="❌">
                    <input type="number" class="input-nota" required placeholder="Nota" min="0" max="100">
                    <input type="number" class="input-porcentaje" required placeholder="%" min="1" max="100">

                </div>

                <div class="notaMinima-card" >

                    <label>Nota mínima para aprobar (opcional)</label>
                    <input type="number" id="notaMinima" placeholder="Mínima" min="0" max="100">

                </div>

                <div class="acciones">
                    <button class="btn-primary-calculo" id="agregarRubro">+ Agregar rubro</button>
                    <button class="btn-primary-calculo" id="limpiar">Limpiar</button>
                    <button class="btn-primary-calculo" id="calcularNota">Calcular nota</button>
                </div>

            </div>

            <div id="result">
                <h3>Aquí se mostrará un detalle de la nota</h3>
            </div>

        </form>

        </div>
