<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/styleCourse.css">
    <title>Grade Manager | Cursos</title>
</head>

<body>
    <header class="site-header" id="header">
        <p class="logo"><strong><a href="index.html">Grade Manager</a></strong></p>

        <input type="checkbox" id="menu-toggle">

        <label for="menu-toggle" class="hamburguesa">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <!--Modificar-->
        <div class="menu-nav">
            <nav>
                <select class="header-interactables" id="sections">
                    <option value="">Secciones</option>
                    <option value="#hero">Inicio</option>
                    <option value="#about">Acerca de</option>
                    <option value="#funcionamiento">Tutorial</option>
                    <option value="#contact">Contacto</option>
                </select>
                <select class="header-interactables" id="solutions">
                    <option>Soluciones</option>
                    <option>Asignaciones</option>
                    <option>Calcular notas</option>
                </select>
            </nav>
            <nav>
                <button class="header-interactables">Acceder</button>
                <button class="header-interactables">Registrarse</button>
            </nav>
        </div>

    </header>
    <main>

        <section class="courses-container">
            <h1 class="page-title">Mis cursos</h1>

            <!--Toolbar-->
            <div class="courses-toolbar">
                <div class="search-container">
                    <input type="text" id="searchCourses" placeholder="Buscar Curso" class="search-input">
                    <span class="search-icon">&#x1F50E;</span>
                </div>

                <div class="filters-container">
                    <select id="filterOrder" class="filter-select">
                        <option value="name">Ordenar por: Nombre</option>
                        <option value="creationDate">Ordenar por: Más reciente</option>
                        <option value="lastUpdate">Ordenar por: Última modificación</option>
                    </select>

                    <select id="filterStatus" class="filter-select">
                        <option value="all">Todos los cursos</option>
                        <option value="approved">Aprobados</option>
                        <option value="pending">Pendientes</option>
                    </select>

                    <select id="filterSemester" class="filter-select">
                        <option value="all">Todos los Semestres</option>
                        <option value="asdasd">(Cargarlos por el JSON)</option>
                    </select>
                </div>

                <button id="btnCreateCourse" class="btn-primary">
                    <span></span> Crear Curso
                </button>
            </div>

            <!--Courses grid-->
            <div id="coursesContainer" class="courses-grid">
                <!--It's loaded with js-->
            </div>

            <div class="courses-counter" id="coursesCounter">
                Mostrando 0 de 0 Cursos
            </div>
        </section>

        <!--Floating window to create courses-->
        <div id="windowOverlay" class="window-overlay hidden">
            <div class="window-box">
                <div class="window-header">
                    <h2>Crear curso</h2>
                    <button id="btnCloseWindow" class="window-close" type="button">
                        X
                    </button>
                </div>

                <!--Form to create the courses-->
                <form id="formCreateCourse" class="window-form">
                    <div class="form-group">
                        <label for="inputCourseName">Nombre del curso</label>
                        <input type="text" id="inputCourseName" required>
                        <span class="error-message" id="errorName"></span>
                    </div>

                    <div class="form-group">
                        <label for="inputCourseDescription">Descripción</label>
                        <textarea id="inputCourseDescription" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="CourseCategory">Categoría</label>
                        <select id="CourseCategory">
                            <option value="it">Tecnología</option>
                            <option value="math">Matemáticas</option>
                            <option value="science">Ciencias</option>
                            <option value="languages">Idiomas</option>
                            <option value="socialSciences">Sociales</option>
                            <option value="sports">Deportes</option>
                            <option value="economics">Economía</option>
                            <option value="others">Otros</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="inputCourseSemester">Semestre</label>
                        <input type="text" id="inputCourseSemester" placeholder="I, II, III, IV...">
                    </div>

                    <div class="window-actions">
                        <button type="button" id="btnCancelCreate" class="btn-secondary">Cancelar</button>
                        <button id="btn" type="submit" class="btn-primary">Gurdar Curso</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div></div>

                        <img src="assets/images/facebook.png">
                    </a>
                </li>
                <li><a class="active-link" href="https://x.com/?lang=es" target="_blank">
                        <img src="assets/images/x.png">
                    </a>
                </li>
            </ul>
            Alajuela, Costa Rica
        </address>

            <small>&copy; 2026 Grade Manager. Todos los derechos reservados.</small>

            <li><a href="login.html">Asignaciones</a></li>

    </footer>

</body>

</html>
