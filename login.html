<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <title>Grade Manager | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="CSS/styleLogin.css">

</head>

<body>
    <header class="site-header" id="header">
        <p class="logo"><strong><a href="index.html">Grade Manager</a></strong></p>

        <input type="checkbox" id="menu-toggle">

        <label for="menu-toggle" class="hamburguesa">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <div class="menu-nav">
            <nav>
                <select id="sections" class="header-interactables" id="sections">
                    <option value="">Secciones</option>
                    <option value="#authenticate">Login</option>
                    <option value="#contact">Contacto</option>
                </select>

            </nav>
            <nav>
                <button class="header-interactables" onclick="showTab(event, 'login')">Acceder</button>
                <button class="header-interactables" onclick="showTab(event, 'register')">Registrarse</button>
            </nav>
        </div>

    </header>
    <main id="authenticate">

        <div class="login-container">
            <div class="login-box">
                <div class="tabs-container">
                    <button class="login-tab active" onclick="showTab(event, 'login')">Iniciar Sesión</button>
                    <button class="login-tab" onclick="showTab(event, 'register')">Registrarse</button>
                </div>

                <div id="login" class="login-form active">
                    <h2>Iniciar Sesión</h2>
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label for="login-email">Email</label>
                            <input type="email" id="login-email" name="email" placeholder="ejemplo@correo.com" required>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Contraseña</label>
                            <input type="password" id="login-password" name="password" placeholder="***********"
                                required>
                        </div>
                        <div class="form-group">
                            <label>
                                <input type="checkbox" name="remember"> Recordarme
                            </label>
                        </div>
                        <button type="submit" class="btn-primary">Ingresar</button>
                        <p class="login-link"><a href="#">¿Olvidó su contraseña?</a></p>
                    </form>
                </div>

                <div id="register" class="login-form">
                    <h2>Registrarse</h2>
                    <form action="#" method="POST">
                        <div class="form-group">
                            <label for="register-name">Nombre de Usuario</label>
                            <input type="text" id="register-name" name="name" placeholder="Usuario" required>
                        </div>
                        <div class="form-group">
                            <label for="register-email">Email</label>
                            <input type="email" id="register-email" name="email" placeholder="ejemplo@correo.com"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="register-password">Contraseña</label>
                            <input type="password" id="register-password" name="password" placeholder="***********"
                                required>
                        </div>
                        <div class="form-group">
                            <label for="register-confirm">Confirmar Contraseña</label>
                            <input type="password" id="register-confirm" name="password" placeholder="***********"
                                required>
                        </div>
                        <button type="submit" class="btn-primary">Registrarse</button>
                    </form>
                </div>
            </div>
        </div>
    </main>



    <footer id="contact">
        <h2>Contacto</h2>
        <address>
            Grade Manager<br>
            Correo: gaariaspa@est.utn.ac.cr | romoraca@est.utn.ac.cr
            <ul>
                <li>
                    <a class="active-link" href="https://www.instagram.com/" target="_blank">
                        <img src="assets/images/instagram.png">
                    </a>
                </li>
                <li><a class="active-link" href="https://www.facebook.com/?locale=es_LA" target="_blank">
                        <img src="assets/images/facebook.png">
                    </a>
                </li>
                <li><a class="active-link" href="https://x.com/?lang=es" target="_blank">
                        <img src="assets/images/x.png">
                    </a>
                </li>
            </ul>
            Alajuela, Costa Rica
        </address>

        <p>
            <small>&copy; 2026 Grade Manager. Todos los derechos reservados.</small>
        </p>

        <h5>Enlaces rápidos</h5>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="#authenticate">Login</a></li>
            <li><a href="login.html">Asignaciones</a></li>
            <!--Habría que poner un if sesión iniciada mandar a esa 
            ventana, sino, a login-->
        </ul>
    </footer>
    <script src="js/login.js"></script>
    <scrip src="js/buttons.js"></scrip>
</body>

</html>
